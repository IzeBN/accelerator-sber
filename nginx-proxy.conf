# ── HTTP → HTTPS редиректы ────────────────────────────────────────────────────
server {
    listen 80;
    server_name accelerator-sber.ru www.accelerator-sber.ru;
    return 301 https://accelerator-sber.ru$request_uri;
}

server {
    listen 80;
    server_name api.accelerator-sber.ru;
    return 301 https://api.accelerator-sber.ru$request_uri;
}

# ── accelerator-sber.ru → frontend (HTTPS) ───────────────────────────────────
server {
    listen 443 ssl;
    server_name accelerator-sber.ru www.accelerator-sber.ru;

    ssl_certificate     /etc/letsencrypt/live/accelerator-sber.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/accelerator-sber.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        resolver 127.0.0.11 valid=5s;
        set $upstream_frontend http://frontend:80;
        proxy_pass $upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ── api.accelerator-sber.ru → backend (HTTPS) ────────────────────────────────
server {
    listen 443 ssl;
    server_name api.accelerator-sber.ru;

    ssl_certificate     /etc/letsencrypt/live/api.accelerator-sber.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.accelerator-sber.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        resolver 127.0.0.11 valid=5s;
        set $upstream_backend http://backend:8000;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
